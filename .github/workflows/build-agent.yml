name: Build Android Agent APK

on:
  push:
    branches: [ main ]
    paths:
      - 'agent-android/**'
  pull_request:
    paths:
      - 'agent-android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('agent-android/**/*.gradle*', 'agent-android/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: agent-android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hub-agent-debug
          path: agent-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
