version: "3.9"

services:
  backend:
    build: ./backend
    image: hub-mediacenter-backend:latest
    pull_policy: build
    container_name: hub-mediacenter-backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/hub.db
      - DATA_DIR=/data
      - PORT=8020
      - MARQUESAS_URL=${MARQUESAS_URL:-http://192.168.1.223:8090}
    volumes:
      - hub_data:/data
    ports:
      - "8020:8020"

  frontend:
    build: ./frontend
    image: hub-mediacenter-frontend:latest
    pull_policy: build
    container_name: hub-mediacenter-frontend
    restart: unless-stopped
    ports:
      - "3050:80"
    depends_on:
      - backend

volumes:
  hub_data:
